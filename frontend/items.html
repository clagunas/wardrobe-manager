<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Items</title>

  <!-- Shared styles first -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Optional page-specific styles after -->
  <!-- <link rel="stylesheet" href="css/items.css"> -->

  <!-- Or inline page-specific styles -->

  <style>

    /* FILTER BAR */
    #filters {
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    #filters label {
      font-size: 0.9em;
    }

    #filters select,
    #filters input {
      padding: 4px;
    }

  </style>
  
</head>

<body>

<h1>Clothing Items</h1>

<button class="action-button">Create outfit</button>
<button class="action-button">Create lookbook</button>

<div id="filters">

<label>Category</label>
<div class="filter-group" id="category-filters">
<label><input type="checkbox" value="Top"> Top</label>
<label><input type="checkbox" value="Pants"> Pants</label>
<label><input type="checkbox" value="Shoes"> Shoes</label>
</div>

<label>Season</label>
<div class="filter-group" id="season-filters">
<label><input type="checkbox" value="Summer"> Summer</label>
<label><input type="checkbox" value="Winter"> Winter</label>
<label><input type="checkbox" value="Spring/Fall"> Spring/Fall</label>
<label><input type="checkbox" value="All-year"> All-year</label>
</div>

<label>Color</label>
<input id="color" placeholder="Blue, Black">

<label>Brand</label>
<input id="brand" placeholder="Levi's">

<label>
<input type="checkbox" id="second_hand">
Second-hand
</label>

</div>

<div id="items-grid" class="grid-layout"></div>

<script>

const API_BASE = "http://127.0.0.1:8000";
const arrayFields = ["colors", "category", "season"];

/* ---------- helpers ---------- */

function formatField(value, fieldName) {
  if (!value) return "";
  if (arrayFields.includes(fieldName)) {
    return Array.isArray(value) ? value.join(", ") : value;
  }
  return value;
}

function getSelectValues(id) {
  return [...document.getElementById(id).selectedOptions].map(o => o.value);
}

function getInputList(id) {
  const val = document.getElementById(id).value.trim();
  if (!val) return null;
  return val.split(",").map(v => v.trim());
}

function getCheckedValues(containerId) {

  const boxes = document.querySelectorAll(
    `#${containerId} input[type="checkbox"]:checked`
  );

  const values = [...boxes].map(b => b.value);

  return values.length ? values : null;
}

/* ---------- collect filters ---------- */

function collectFilters() {

  const filters = {
    category: getCheckedValues("category-filters"),
    season: getCheckedValues("season-filters"),
    color: getInputList("color"),
    brand: getInputList("brand"),
    second_hand: document.getElementById("second_hand").checked ? [true] : null
  };

  Object.keys(filters).forEach(key => {
    if (!filters[key] || filters[key].length === 0) delete filters[key];
  });

  return filters;
}

/* ---------- render items ---------- */

function renderItems(items) {

  const grid = document.getElementById("items-grid");
  grid.innerHTML = "";

  if (!items.length) {
    grid.innerHTML = "No items found.";
    return;
  }

  items.forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    if (item.image_filename) {
      const img = document.createElement("img");
      img.src = `/images/${item.image_filename}`;
      img.alt = item.name || "";
      card.appendChild(img);
    }

    const nameDiv = document.createElement("div");
    nameDiv.className = "card-name";

    if (item.id) {
      const link = document.createElement("a");
      link.href = `item.html?id=${encodeURIComponent(item.id)}`;
      link.textContent = item.name;
      nameDiv.appendChild(link);
    } else {
      nameDiv.textContent = item.name;
    }

    card.appendChild(nameDiv);

    ["colors", "season", "category"].forEach(field => {
      const meta = document.createElement("div");
      meta.className = "card-meta";
      meta.textContent =
        `${field.charAt(0).toUpperCase() + field.slice(1)}: ` +
        formatField(item[field], field);
      card.appendChild(meta);
    });

    grid.appendChild(card);

  });
}

/* ---------- fetch items ---------- */

async function loadItems() {

  const filters = collectFilters();

  const url =
    Object.keys(filters).length === 0
      ? `${API_BASE}/items`
      : `${API_BASE}/filter_items`;

  const options =
    Object.keys(filters).length === 0
      ? {}
      : {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(filters)
        };

  try {

    const response = await fetch(url, options);
    const items = await response.json();

    renderItems(items);

  } catch (err) {

    console.error(err);
    document.getElementById("items-grid").innerHTML =
      "Failed to load items.";

  }
}

/* ---------- auto update filters ---------- */

document.querySelectorAll("#filters input")
  .forEach(el => el.addEventListener("change", loadItems));

/* ---------- initial load ---------- */

loadItems();

document.getElementById("create-outfit-button").addEventListener("click", () => {
    window.location.href = "create_outfit.html";
});

document.getElementById("create-lookbook-button").addEventListener("click", () => {
    window.location.href = "create_lookbook.html";
});

</script>

</body>
</html>
