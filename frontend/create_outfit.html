<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Outfit</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

/* FILTER BAR */

#filters {
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}

#filters label {
  font-size: 0.9em;
}

#filters select,
#filters input {
  padding: 4px;
}

/* GRID */

#items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

#layout{
  display:grid;
  grid-template-columns: 1fr 260px;
  gap:25px;
}

#selected-panel{
  border:1px solid #ddd;
  border-radius:8px;
  padding:12px;
  background:white;
  height:fit-content;
  position:sticky;
  top:20px;
}

#selected-items{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
}

.selected-item{
  display:flex;
  align-items:center;
  gap:8px;
  border:1px solid #eee;
  border-radius:6px;
  padding:6px;
}

.selected-item img{
  width:40px;
  height:40px;
  object-fit:contain;
}

.remove-item{
  margin-left:auto;
  cursor:pointer;
  color:red;
  font-weight:bold;
}

/* CARD */

.item-card {
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 12px;
  background: white;
  text-align: center;
}

.item-card img {
  width: 100%;
  max-height: 200px;
  object-fit: contain;
  margin-bottom: 10px;
}

.item-name {
  font-weight: bold;
  margin-bottom: 6px;
}

.item-meta {
  font-size: 0.9em;
  color: #555;
}

/* outfit form */

#outfit-form {
  margin-bottom: 20px;
}

#create-outfit-button {
  padding: 8px 16px;
  border: 1px solid #ddd;
  border-radius: 6px;
  background: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Create Outfit</h1>

<div id="outfit-form">
<label>Outfit Name</label>
<input id="outfit-name" placeholder="Casual Summer Look">

<label>Season</label>
<select id="season">
<option value="">None</option>
<option value="Spring/Fall">Spring/Fall</option>
<option value="Summer">Summer</option>
<option value="Winter">Winter</option>
<option value="All-year">All-year</option>
</select>

<button id="create-outfit-button">Create Outfit</button>
</div>

<!-- SAME FILTERS AS IN ITEMS -->

<div id="filters">

<label>Category</label>
<div class="filter-group" id="category-filters">
<label><input type="checkbox" value="Top"> Top</label>
<label><input type="checkbox" value="Pants"> Pants</label>
<label><input type="checkbox" value="Shoes"> Shoes</label>
</div>

<label>Season</label>
<div class="filter-group" id="season-filters">
<label><input type="checkbox" value="Summer"> Summer</label>
<label><input type="checkbox" value="Winter"> Winter</label>
<label><input type="checkbox" value="Spring/Fall"> Spring/Fall</label>
<label><input type="checkbox" value="All-year"> All-year</label>
</div>

<label>Color</label>
<input id="color" placeholder="Blue, Black">

<label>Brand</label>
<input id="brand" placeholder="Levi's">

<label>
<input type="checkbox" id="second_hand">
Second-hand
</label>

</div>

<!-- <div id="items-grid"></div> -->
<div id="layout">

  <div id="items-section">
      <div id="items-grid"></div>
  </div>

  <div id="selected-panel">
      <h3>Current Outfit</h3>
      <div id="selected-count">Selected: 0</div>
      <div id="selected-items"></div>
  </div>

</div>

<script>

const API_BASE = "http://127.0.0.1:8000";
const arrayFields = ["colors", "category", "season"];

/* store selected items */
const selectedItems = new Map();

/* ---------- helpers ---------- */

function formatField(value, fieldName) {
  if (!value) return "";
  if (arrayFields.includes(fieldName)) {
    return Array.isArray(value) ? value.join(", ") : value;
  }
  return value;
}

function getInputList(id) {
  const val = document.getElementById(id).value.trim();
  if (!val) return null;
  return val.split(",").map(v => v.trim());
}

function getCheckedValues(containerId) {

  const boxes = document.querySelectorAll(
    `#${containerId} input[type="checkbox"]:checked`
  );

  const values = [...boxes].map(b => b.value);

  return values.length ? values : null;
}

/* ---------- collect filters ---------- */

function collectFilters() {

  const filters = {
    category: getCheckedValues("category-filters"),
    season: getCheckedValues("season-filters"),
    color: getInputList("color"),
    brand: getInputList("brand"),
    second_hand: document.getElementById("second_hand").checked ? [true] : null
  };

  Object.keys(filters).forEach(key => {
    if (!filters[key] || filters[key].length === 0) delete filters[key];
  });

  return filters;
}

/* ---------- update selected panel ---------- */

function updateSelectedPanel(){

  const container = document.getElementById("selected-items");
  const counter = document.getElementById("selected-count");

  container.innerHTML = "";

  selectedItems.forEach(item => {

    const div = document.createElement("div");
    div.className = "selected-item";

    if(item.image_filename){
      const img = document.createElement("img");
      img.src = `/images/${item.image_filename}`;
      div.appendChild(img);
    }

    const name = document.createElement("div");
    name.textContent = item.name;
    div.appendChild(name);

    const remove = document.createElement("div");
    remove.textContent = "✕";
    remove.className = "remove-item";

    remove.onclick = () => {
        selectedItems.delete(item.id);
        updateSelectedPanel();
        loadItems(); // refresh grid to uncheck
    };

    div.appendChild(remove);

    container.appendChild(div);

  });

  counter.textContent = `Selected: ${selectedItems.size}`;
}

/* ---------- render items ---------- */

function renderItems(items) {

  const grid = document.getElementById("items-grid");
  grid.innerHTML = "";

  if (!items.length) {
    grid.innerHTML = "No items found.";
    return;
  }

  items.forEach(item => {

    const card = document.createElement("div");
    card.className = "item-card";

    /* checkbox */

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.value = item.id;

    checkbox.checked = selectedItems.has(item.id);

    checkbox.addEventListener("change", () => {

      if (checkbox.checked)
        selectedItems.set(item.id, item);
      else
        selectedItems.delete(item.id);
        updateSelectedPanel();

    });

    card.appendChild(checkbox);

    /* image */

    if (item.image_filename) {
      const img = document.createElement("img");
      img.src = `/images/${item.image_filename}`;
      img.alt = item.name || "";
      card.appendChild(img);
    }

    /* name */

    const nameDiv = document.createElement("div");
    nameDiv.className = "item-name";
    nameDiv.textContent = item.name;

    card.appendChild(nameDiv);

    /* metadata */

    ["colors", "season", "category"].forEach(field => {
      const meta = document.createElement("div");
      meta.className = "item-meta";
      meta.textContent =
        `${field.charAt(0).toUpperCase() + field.slice(1)}: ` +
        formatField(item[field], field);
      card.appendChild(meta);
    });

    grid.appendChild(card);

  });

}

/* ---------- fetch items ---------- */

async function loadItems() {

  const filters = collectFilters();

  const url =
    Object.keys(filters).length === 0
      ? `${API_BASE}/items`
      : `${API_BASE}/filter_items`;

  const options =
    Object.keys(filters).length === 0
      ? {}
      : {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(filters)
        };

  try {

    const response = await fetch(url, options);
    const items = await response.json();

    renderItems(items);

  } catch (err) {

    console.error(err);
    document.getElementById("items-grid").innerHTML =
      "Failed to load items.";

  }
}

/* ---------- create outfit ---------- */

async function createOutfit() {

  const name = document.getElementById("outfit-name").value.trim();
  const season = document.getElementById("season").value;

  const items = Array.from(selectedItems.keys());

  if (!name) {
    alert("Outfit name required");
    return;
  }

  if (items.length === 0) {
    alert("Select at least one item");
    return;
  }

  const payload = { name, items };

  if (season) payload.season = season;

  // await fetch(`${API_BASE}/create_outfit`, {
  //   method: "POST",
  //   headers: {"Content-Type": "application/json"},
  //   body: JSON.stringify(payload)
  // });

  // alert("Outfit created!");

  try {

    const response = await fetch(`${API_BASE}/create_outfit`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    if (!response.ok) {
      alert(data.detail || "Failed to create outfit");
      return;
    }

    alert("Outfit created!");

  } catch(err) {

    console.error(err);
    alert("Server error");

  }

}

/* ---------- events ---------- */

document.querySelectorAll("#filters input")
  .forEach(el => el.addEventListener("change", loadItems));

document.getElementById("create-outfit-button")
  .addEventListener("click", createOutfit);

/* ---------- initial load ---------- */

loadItems();

</script>

</body>
</html>
