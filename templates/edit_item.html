{% extends "base.html" %}

{% block content %}

<h2>Edit Item</h2>

<form method="post" action="/edit-item/{{ item._id }}" enctype="multipart/form-data">


<label>Name:</label>
<input type="text" name="name" value="{{ item.name }}" required>
<br><br>

<label>Category:</label>
<select name="category">
{% for c in all_categories %}
<option value="{{ c }}" {% if c == item.category %}selected{% endif %}>
{{ c }}
</option>
{% endfor %}
</select>

<br><br>

<label>Brand:</label>
<input type="text" name="brand" value="{{ item.brand }}">

<br><br>

<label>Price:</label>
<input type="number" step="0.01" name="price" value="{{ item.price }}">

<br><br>

<label>Colors:</label>
<div class="filter-group">
{% for c in all_colors %}
<label>
<input type="checkbox" name="colors" value="{{ c }}"
{% if c in item.colors %}checked{% endif %}>
{{ c }}
</label>
{% endfor %}
</div>

<br>

<label>Season:</label>
<div class="filter-group">
{% for s in all_seasons %}
<label>
<input type="checkbox" name="seasons" value="{{ s }}"
{% if s in item.season %}checked{% endif %}>
{{ s }}
</label>
{% endfor %}
</div>

<br>

<label>Style:</label>
<div class="filter-group">
{% for s in all_styles %}
<label>
<input type="checkbox" name="style" value="{{ s }}"
{% if s in item.style %}checked{% endif %}>
{{ s }}
</label>
{% endfor %}
</div>

<br>

<label>New Image:</label>
<input type="file" name="image">

<br><br>

<button type="submit">Save Changes</button>

</form>

{% endblock %}
